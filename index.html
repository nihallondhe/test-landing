<!DOCTYPE >
< lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <main class="glass rounded-3xl p-12 max-w-4xl w-full shadow-2xl">
        <div class="text-center">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-6">
                Elevate Your Digital Experience
            </h1>
            <p class="text-xl text-white/80 mb-10 max-w-2xl mx-auto">
                Discover the future of design with our cutting-edge platform. Simple, powerful, and beautifully crafted for creators.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button class="bg-white text-purple-700 font-semibold py-4 px-8 rounded-xl hover:bg-gray-100 transition duration-300 shadow-lg">
                    Get Started Free
                </button>
                <button class="glass text-white font-semibold py-4 px-8 rounded-xl hover:bg-white/20 transition duration-300 border border-white/30">
                    Watch Demo
                </button>
            </div>
        </div>
        <div class="mt-16 grid grid-cols-1 sm:grid-cols-3 gap-6 text-white">
            <div class="glass p-6 rounded-2xl text-center">
                <div class="text-3xl font-bold mb-2">10K+</div>
                <div class="opacity-80">Happy Users</div>
            </div>
            <div class="glass p-6 rounded-2xl text-center">
                <div class="text-3xl font-bold mb-2">99.9%</div>
                <div class="opacity-80">Uptime</div>
            </div>
            <div class="glass p-6 rounded-2xl text-center">
                <div class="text-3xl font-bold mb-2">24/7</div>
                <div class="opacity-80">Support</div>
            </div>
        </div>
    </main>
</body>
</>
